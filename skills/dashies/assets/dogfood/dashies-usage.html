<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashies usage</title>
  <!--
    Dashies usage metrics - the dogfood refreshable dashboard for Feature A.

    Authored with the `dashies` skill. Single self-contained file: an inline
    JSON data island (the cube), markup annotated with `data-dash` slots, and
    the inlined runtime. NO external resources, NO network, NO browser storage,
    so it renders correctly under `Content-Security-Policy: sandbox allow-scripts`.

    Data source: public.dashies_usage_metrics (PR1) over the `self` connection -
    a no-PII, day-grain aggregate over public.dashboards. The cube's only
    dimension is the date (`day`), so this dashboard charts the trend rather than
    offering a filter dropdown of every date. Every measure is an additive count;
    the two share metrics are rendered as num/den ratios (correct under roll-up).

    Refresh: the PR4 cron re-runs the manifest's cube_sql daily and rewrites ONLY
    the #dashies-data island below; this markup and the runtime are never touched.
    The cube embedded here is an initial PLACEHOLDER (clearly synthetic) so the
    page renders before the first real refresh - the cron overwrites it on run 1.
  -->
  <style>
    :root {
      --blue: #2563eb;
      --ink: #0f172a;
      --muted: #475569;
      --subtle: #64748b;
      --line: #e2e8f0;
      --canvas: #f6f8fa;
      --surface: #fff;
      --sans: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      --mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      font-optical-sizing: auto;
    }
    .wrap { max-width: 1040px; margin: 0 auto; padding: 40px 24px 80px; }
    header { margin-bottom: 24px; }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 4px; }
    .sub { color: var(--subtle); font-size: 13px; margin: 0; }
    .sub .stamp { color: var(--muted); font-weight: 500; }
    .kpis {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px;
    }
    .kpi {
      display: flex; flex-direction: column; gap: 8px;
      padding: 16px 18px; background: var(--surface);
      border: 1px solid var(--line); border-radius: 10px;
    }
    .kpi-label {
      font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--subtle);
    }
    .kpi-value {
      font-family: var(--mono); font-variant-numeric: tabular-nums slashed-zero;
      font-size: 28px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.05;
    }
    .section-h {
      font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--subtle); margin: 4px 2px 12px;
    }
    .kpis.status .kpi-value { font-size: 22px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 18px; }
    .card-h { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 14px; letter-spacing: -0.01em; }
    @media (max-width: 760px) {
      .kpis { grid-template-columns: repeat(2, 1fr); }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Dashies usage</h1>
      <p class="sub">Published dashboards across Dashies, refreshed daily &middot; Updated <span class="stamp" data-dash="updated-at">-</span></p>
    </header>

    <!-- Headline KPIs. Counts are additive sums over the whole window; the two
         share metrics are sum(num)/sum(den) ratios, correct under any roll-up. -->
    <div class="kpis">
      <div class="kpi" data-dash="metric" data-measure="dashboards_published">
        <span class="kpi-label">Total published</span>
        <span class="kpi-value" data-dash-value>-</span>
      </div>
      <div class="kpi" data-dash="metric" data-num="public_count" data-den="dashboards_published" data-format="percent">
        <span class="kpi-label">Public share</span>
        <span class="kpi-value" data-dash-value>-</span>
      </div>
      <div class="kpi" data-dash="metric" data-num="scheduled_count" data-den="dashboards_published" data-format="percent">
        <span class="kpi-label">Scheduled share</span>
        <span class="kpi-value" data-dash-value>-</span>
      </div>
      <div class="kpi" data-dash="metric" data-measure="scheduled_count">
        <span class="kpi-label">Currently scheduled</span>
        <span class="kpi-value" data-dash-value>-</span>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-h">Dashboards published per day</div>
        <div data-dash="chart" data-type="area" data-x="day" data-measure="dashboards_published" data-height="240"></div>
      </div>
      <div class="card">
        <div class="card-h">Scheduled dashboards per day</div>
        <div data-dash="chart" data-type="line" data-x="day" data-measure="scheduled_count" data-height="240"></div>
      </div>
    </div>

    <div class="section-h">Status of published dashboards</div>
    <div class="kpis status">
      <div class="kpi" data-dash="metric" data-measure="active_count">
        <span class="kpi-label">Active</span>
        <span class="kpi-value" data-dash-value>-</span>
      </div>
      <div class="kpi" data-dash="metric" data-measure="paused_count">
        <span class="kpi-label">Paused</span>
        <span class="kpi-value" data-dash-value>-</span>
      </div>
      <div class="kpi" data-dash="metric" data-measure="failed_count">
        <span class="kpi-label">Failed</span>
        <span class="kpi-value" data-dash-value>-</span>
      </div>
      <div class="kpi" data-dash="metric" data-measure="archived_count">
        <span class="kpi-label">Archived</span>
        <span class="kpi-value" data-dash-value>-</span>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <div class="card-h">Daily detail</div>
      <!-- Grouped by day; one row per day, newest first. -->
      <div data-dash="table"
           data-group="day"
           data-columns="day,dashboards_published,public_count,private_count,scheduled_count"
           data-sort="day:desc"
           data-limit="14"></div>
    </div>
  </div>

  <!-- The Dashies dashboard runtime (web/dashboard-runtime/runtime.js, contract
       v1), inlined verbatim. Re-inline the current bytes at publish time. -->
  <script>
/*
 * Dashies dashboard runtime (PR2)
 * ---------------------------------
 * A standalone, dependency-free client runtime that gets INLINED into a
 * published Dashies dashboard's HTML. It reads an embedded JSON "data island",
 * binds the cube to elements marked with `data-dash` attributes, aggregates the
 * cube client-side per the active filters, and renders KPIs, tables, and sober
 * SVG charts. On a filter change it re-aggregates and re-renders. No business
 * logic lives here: derived measures are precomputed in the cube; the runtime
 * only filters additive measures, formats, and renders.
 *
 * SANDBOX CONTRACT (load-bearing - see CONTRACT.md)
 * Published dashboards are served under `Content-Security-Policy: sandbox
 * allow-scripts`. Inline scripts run, but the document is an OPAQUE origin with
 * NO `allow-same-origin`: there is no localStorage / sessionStorage / cookies /
 * IndexedDB and no same-origin fetch. This runtime therefore:
 *   - keeps ALL state in memory and the URL hash (never in storage);
 *   - never calls fetch / XMLHttpRequest / WebSocket / localStorage / cookie;
 *   - never replaces document.body wholesale (the serve-time "Powered by"
 *     badge is appended as the last child of <body>; we only fill matched
 *     slot elements and append a <style> to <head>).
 *
 * No build step: this file is plain ES2017+ and is concatenated verbatim into
 * the dashboard <script> by the authoring side (the `dashies` skill / MCP).
 */
(function () {
  'use strict';

  // Run exactly once even if accidentally inlined twice.
  if (window.__dashiesRuntime) return;
  window.__dashiesRuntime = { version: 1 };

  var SVGNS = 'http://www.w3.org/2000/svg';
  var ALL = '__all__'; // filter sentinel meaning "no constraint on this dimension"

  // ---------------------------------------------------------------------------
  // Data island
  // ---------------------------------------------------------------------------

  function readIsland() {
    var node = document.getElementById('dashies-data');
    if (!node) return null;
    try {
      return JSON.parse(node.textContent || '{}');
    } catch (err) {
      // Surface a parse failure visibly rather than silently rendering nothing.
      console.error('[dashies] data island is not valid JSON:', err);
      return null;
    }
  }

  // Normalize the spec so the rest of the runtime can assume shapes exist.
  function normalizeSpec(raw) {
    var spec = raw || {};
    spec.cube = Array.isArray(spec.cube) ? spec.cube : [];
    spec.dimensions = Array.isArray(spec.dimensions) ? spec.dimensions : [];
    spec.measures = Array.isArray(spec.measures) ? spec.measures : [];
    spec.format = spec.format && typeof spec.format === 'object' ? spec.format : {};
    // Index measures/dimensions by key for O(1) lookup during binding.
    spec._measureByKey = {};
    spec.measures.forEach(function (m) {
      if (m && m.key) spec._measureByKey[m.key] = m;
    });
    spec._dimByKey = {};
    spec.dimensions.forEach(function (d) {
      if (d && d.key) spec._dimByKey[d.key] = d;
    });
    return spec;
  }

  // ---------------------------------------------------------------------------
  // Cube engine (the hand-rolled dataframe subset)
  //
  // The cube is pre-aggregated to the dashboard's grain, with LOW-CARDINALITY
  // dimensions, so linear scans are more than fast enough (thousands of rows
  // render in well under a frame). Every measure the runtime rolls up MUST be
  // additive (sum / min / max / count / distinct). Averages and rates are
  // expressed as a `ratio` of two additive measures so they stay correct under
  // filtering - see CONTRACT.md "Additivity".
  // ---------------------------------------------------------------------------

  // Distinct values of a dimension, in first-seen order (stable filter menus).
  function distinctValues(cube, key) {
    var seen = Object.create(null);
    var out = [];
    for (var i = 0; i < cube.length; i++) {
      var v = cube[i][key];
      if (v === undefined || v === null) continue;
      var s = String(v);
      if (!seen[s]) {
        seen[s] = true;
        out.push(v);
      }
    }
    return out;
  }

  // Rows matching every active filter (AND across dimensions). A value of ALL
  // (or absent) imposes no constraint.
  function filterRows(cube, filters) {
    var keys = Object.keys(filters || {});
    var active = keys.filter(function (k) {
      return filters[k] !== undefined && filters[k] !== ALL;
    });
    if (active.length === 0) return cube;
    return cube.filter(function (row) {
      for (var i = 0; i < active.length; i++) {
        var k = active[i];
        if (String(row[k]) !== String(filters[k])) return false;
      }
      return true;
    });
  }

  function toNum(v) {
    var n = typeof v === 'number' ? v : parseFloat(v);
    return Number.isFinite(n) ? n : 0;
  }

  // Reduce a set of rows to a single scalar for one measure under one agg.
  function aggregate(rows, key, agg) {
    if (!rows.length) return agg === 'min' || agg === 'max' ? null : 0;
    var i;
    switch (agg) {
      case 'count':
        return rows.length;
      case 'distinct': {
        var seen = Object.create(null);
        var c = 0;
        for (i = 0; i < rows.length; i++) {
          var s = String(rows[i][key]);
          if (!seen[s]) {
            seen[s] = true;
            c++;
          }
        }
        return c;
      }
      case 'min': {
        var mn = Infinity;
        for (i = 0; i < rows.length; i++) mn = Math.min(mn, toNum(rows[i][key]));
        return mn === Infinity ? null : mn;
      }
      case 'max': {
        var mx = -Infinity;
        for (i = 0; i < rows.length; i++) mx = Math.max(mx, toNum(rows[i][key]));
        return mx === -Infinity ? null : mx;
      }
      case 'avg': {
        // Unweighted mean of cube rows. Correct only when the cube grain equals
        // the displayed grain (no roll-up). Prefer a `ratio` metric otherwise.
        var sa = 0;
        for (i = 0; i < rows.length; i++) sa += toNum(rows[i][key]);
        return sa / rows.length;
      }
      case 'sum':
      default: {
        var s2 = 0;
        for (i = 0; i < rows.length; i++) s2 += toNum(rows[i][key]);
        return s2;
      }
    }
  }

  // Group rows by a dimension and reduce one measure per group.
  // Returns [{ key, value }] in first-seen order (or date order if the
  // dimension is declared type:"date").

      if (step >= 26) {
        var t = svg('text', {
          x: pad.left + step * i + step / 2, y: H - pad.bottom + 16,
          'text-anchor': 'middle', class: 'drt-cat',
        });
        t.textContent = truncate(String(d.key), Math.max(3, Math.floor(step / 7)));
        root.appendChild(t);
      }
    });
    return root;
  }

  function drawHBars(spec, b, data, W) {
    var rowH = 30;
    var pad = { top: 8, right: 56, bottom: 8, left: 120 };
    var H = pad.top + pad.bottom + data.length * rowH;
    var iw = Math.max(10, W - pad.left - pad.right);
    var max = niceMax(Math.max.apply(null, data.map(function (d) {
      return num(d.value);
    })));
    var root = svg('svg', {
      viewBox: '0 0 ' + W + ' ' + H,
      role: 'img',
      'aria-label': chartTitle(spec, b),
    });
    root.appendChild(svgTitle(chartTitle(spec, b)));
    var fmt = b.format || measureMeta(spec, b.measure).format || 'number';
    data.forEach(function (d, i) {
      var v = num(d.value);
      var w = max > 0 ? (v / max) * iw : 0;
      var y = pad.top + i * rowH + 5;
      var bh = rowH - 12;
      // Category label (left, sans).
      var cat = svg('text', { x: pad.left - 10, y: y + bh / 2 + 4, 'text-anchor': 'end', class: 'drt-cat' });
      cat.textContent = truncate(String(d.key), 16);
      root.appendChild(cat);
      var rect = svg('rect', { x: pad.left, y: y, width: Math.max(0, w), height: bh, rx: 2, class: 'drt-bar' });
      rect.appendChild(svgTitle(String(d.key) + ': ' + formatValue(spec, v, fmt)));
      root.appendChild(rect);
      // Value label (right of bar, mono).
      var val = svg('text', { x: pad.left + w + 8, y: y + bh / 2 + 4, class: 'drt-axis', 'text-anchor': 'start' });
      val.textContent = formatValue(spec, v, fmt);
      root.appendChild(val);
    });
    return root;
  }

  function drawLine(spec, b, data, W, H, area) {
    var pad = { top: 16, right: 16, bottom: 34, left: 52 };
    var iw = Math.max(10, W - pad.left - pad.right);
    var ih = Math.max(10, H - pad.top - pad.bottom);
    var max = niceMax(Math.max.apply(null, data.map(function (d) {
      return num(d.value);
    })));
    var root = svg('svg', {
      viewBox: '0 0 ' + W + ' ' + H,
      role: 'img',
      'aria-label': chartTitle(spec, b),
    });
    root.appendChild(svgTitle(chartTitle(spec, b)));

    [0, 0.5, 1].forEach(function (t) {
      var y = pad.top + ih - ih * t;
      root.appendChild(svg('line', {
        x1: pad.left, y1: y, x2: pad.left + iw, y2: y,
        class: t === 0 ? 'drt-baseline' : 'drt-gridline',
      }));
      var lbl = svg('text', { x: pad.left - 8, y: y + 3.5, 'text-anchor': 'end', class: 'drt-axis' });
      lbl.textContent = axisLabel(spec, b, max * t);
      root.appendChild(lbl);
    });

    var n = data.length;
    var x = function (i) {
      return n <= 1 ? pad.left + iw / 2 : pad.left + (iw * i) / (n - 1);
    };
    var y = function (v) {
      return pad.top + ih - (max > 0 ? (num(v) / max) * ih : 0);
    };
    var line = data.map(function (d, i) {
      return (i ? 'L' : 'M') + x(i).toFixed(1) + ' ' + y(d.value).toFixed(1);
    }).join(' ');

    if (area) {
      var areaPath = line + ' L' + x(n - 1).toFixed(1) + ' ' + (pad.top + ih) +
        ' L' + x(0).toFixed(1) + ' ' + (pad.top + ih) + ' Z';
      root.appendChild(svg('path', { d: areaPath, class: 'drt-area' }));
    }
    root.appendChild(svg('path', { d: line, class: 'drt-line' }));

    // First / mid / last x labels only (avoid axis clutter).
    var fmt = b.format || measureMeta(spec, b.measure).format || 'number';
    [0, Math.floor((n - 1) / 2), n - 1].filter(function (v, i, a) {
      return a.indexOf(v) === i && v >= 0;
    }).forEach(function (i) {
      var t = svg('text', { x: x(i), y: H - pad.bottom + 16, 'text-anchor': 'middle', class: 'drt-cat' });
      t.textContent = truncate(String(data[i].key), 12);
      root.appendChild(t);
    });
    // Endpoint dot for scannability.
    root.appendChild(svg('circle', { cx: x(n - 1), cy: y(data[n - 1].value), r: 3, class: 'drt-dot' }));
    var last = svg('title');
    last.textContent = chartTitle(spec, b);
    return root;
  }

  function svgTitle(text) {
    var t = document.createElementNS(SVGNS, 'title');
    t.textContent = text;
    return t;
  }

  function truncate(s, n) {
    return s.length > n ? s.slice(0, Math.max(1, n - 1)) + '…' : s;
  }

  // ---------------------------------------------------------------------------
  // Binding + lifecycle
  // ---------------------------------------------------------------------------

  function boot() {
    var spec = normalizeSpec(readIsland());
    if (!spec) return;
    injectStyle();

    // Collect bound nodes once.
    var nodes = Array.prototype.slice.call(document.querySelectorAll('[data-dash]'));
    var filters = {};
    // Seed active filters from the URL hash, constrained to declared dims.
    var hashFilters = readHashFilters();
    spec.dimensions.forEach(function (d) {
      if (hashFilters[d.key] !== undefined) filters[d.key] = hashFilters[d.key];
    });

    var reducedMotion = window.matchMedia &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function onFilterChange(dim, value) {
      if (value === ALL) delete filters[dim];
      else filters[dim] = value;
      writeHashFilters(filters);
      renderAll();
    }

    function renderAll() {
      var rows = filterRows(spec.cube, filters);
      nodes.forEach(function (node) {
        var b = readBinding(node);
        b.current = filters[b.dim];
        try {
          switch (b.role) {
            case 'metric':
              renderMetric(node, spec, rows, b);
              break;
            case 'updated-at':
              renderUpdatedAt(node, spec, b);
              break;
            case 'filter':
              renderFilter(node, spec, b, onFilterChange);
              break;
            case 'table':
              renderTable(node, spec, rows, b);
              if (!reducedMotion) flash(node);
              break;
            case 'chart':
              renderChart(node, spec, rows, b);
              if (!reducedMotion) flash(node);
              break;
            default:
              break;
          }
        } catch (err) {
          console.error('[dashies] render failed for', b.role, err);
        }
      });
    }

    function flash(node) {
      node.classList.remove('drt-fade');
      // Force reflow so the animation restarts on each re-render.
      void node.offsetWidth;
      node.classList.add('drt-fade');
    }

    renderAll();

    // Re-render charts/tables on width change (responsive, no layout thrash).
    if (window.ResizeObserver) {
      var raf = 0;
      var ro = new ResizeObserver(function () {
        if (raf) return;
        raf = window.requestAnimationFrame(function () {
          raf = 0;
          var rows = filterRows(spec.cube, filters);
          nodes.forEach(function (node) {
            var b = readBinding(node);
            if (b.role === 'chart') renderChart(node, spec, rows, b);
          });
        });
      });
      nodes.forEach(function (node) {
        if (node.getAttribute('data-dash') === 'chart') ro.observe(node);
      });
    }

    // Reflect external hash changes (e.g. shared link / back-forward).
    window.addEventListener('hashchange', function () {
      var hf = readHashFilters();
      var changed = false;
      spec.dimensions.forEach(function (d) {
        var nv = hf[d.key];
        if (nv === undefined && filters[d.key] !== undefined) {
          delete filters[d.key];
          changed = true;
        } else if (nv !== undefined && filters[d.key] !== nv) {
          filters[d.key] = nv;
          changed = true;
        }
      });
      if (changed) renderAll();
    });

    window.__dashiesRuntime.spec = spec;
    window.__dashiesRuntime.rerender = renderAll;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
  </script>
</body>
</html>
